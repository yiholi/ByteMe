<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Localhost Parasite</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.js"></script>
</head>
<body>
    <div id="info">
        <h2>Localhost Parasite</h2>
        <p>
            <span class="status disconnected" id="status"></span>
            <span id="connection-text">Connecting...</span>
        </p>
        <div class="count" id="folderCount">0</div>
        <p style="font-size: 12px; color: #999;">segments active</p>
 
        <!-- NEW: System monitor bars -->
        <div class="sys-monitor">
            <div class="sys-row">
                <span class="sys-label">CPU</span>
                <div class="bar-track">
                    <div class="bar-fill" id="cpu-bar"></div>
                </div>
                <span class="sys-value" id="cpu-value">0%</span>
            </div>
            <div class="sys-row">
                <span class="sys-label">RAM</span>
                <div class="bar-track">
                    <div class="bar-fill" id="ram-bar"></div>
                </div>
                <span class="sys-value" id="ram-value">0%</span>
            </div>
            <div class="sys-row">
                <span class="sys-label">GPU</span>
                <div class="bar-track">
                    <div class="bar-fill bar-gpu" id="gpu-bar"></div>
                </div>
                <span class="sys-value" id="gpu-value">0%</span>
            </div>
        </div>
 
        <p style="font-size: 11px; color: #888; margin-top: 20px;">
            Create/Delete folders → Caterpillar grows
        </p>
        <p style="font-size: 11px; color: #888; margin-top: 5px;">
             Add JPG files as food → Caterpillar eats
        </p>
 
        <!-- Eating information -->
        <div id="feeding-info" style="display:none;">
            <div class="feeding-divider"></div>
            <div id="feeding-status-badge"></div>
            <div id="feeding-filename"></div>
            <img id="feeding-preview" src="" alt="" />
        </div>
 
        <!-- List of the corrupted files -->
        <div id="dead-file-section" style="display:none;">
            <div class="feeding-divider"></div>
            <div style="font-size:11px; font-weight:bold; color:#b71c1c; margin-bottom:6px;">Data Corrupted</div>
            <div id="dead-file-list"></div>
        </div>
    </div>
 
    <script src="sketch.js"></script>
</body>
</html>
